function csvToGeoJSON(text){

const lines=text.trim().split("\n");

const features=[];

for(let i=1;i<lines.length;i++){

const row=lines[i].split(",");

if(row.length<10) continue;

const lat=parseFloat(row[0]);
const lng=parseFloat(row[1]);

if(isNaN(lat)||isNaN(lng)) continue;

features.push({
type:"Feature",
geometry:{
type:"Point",
coordinates:[lng,lat]
},
properties:{
bank:row[2]||"",
tail3:row[3]||"",
trans:row[4]||"",
note:row[5]||"",
pic:row[6]||"",
district:row[7]||"",
ward:row[8]||"",
street:row[9]||""
}
});

}

return {
type:"FeatureCollection",
features
};

}

document.body.appendChild(gpsBtn);

gpsBtn.onclick = () => {

  if (!navigator.geolocation) {
    alert("Thiết bị không hỗ trợ GPS");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

  if (myMarker) {
  myMarker.remove();
}

const dot = document.createElement("div");

dot.style.width = "18px";

    },
    (err) => {

    }
  );

  async function saveNote(lat,lng){

  const phone =
    document.getElementById(
      `phone-${lat}-${lng}`
    ).value;

  const note =
    document.getElementById(
      `note-${lat}-${lng}`
    ).value;

  const res = await fetch(
    "/api/save-note",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        lat,
        lng,
        phone,
        note
      })
    }
  );

  const data = await res.json();

  if(data.success){
    alert("Đã lưu");
  }else{
    alert("Lỗi lưu dữ liệu");
  }

}
</script>
